name: Release

# Quy ước release (theo yêu cầu của Thanh):
# - Tag major  vX.0.0  => BIG RELEASE: tự gộp TẤT CẢ thành phần
#     ("Tính năng MCP cho Claude" + "Bản sửa cho ChatGPT").
# - Tag thường vX.Y.Z (Y/Z != 0) => release ĐỘC LẬP từng phần.
#     Push tag thường: mặc định component = mcp.
#     Muốn phần khác: chạy tay (workflow_dispatch) chọn component all/mcp/chatgpt.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag để release (vd v1.2.0)'
        required: true
        type: string
      component:
        description: 'Phần để release (chỉ áp dụng release thường)'
        required: true
        type: choice
        options: [auto, all, mcp, chatgpt]
        default: auto

permissions:
  contents: write

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml openapi-spec-validator boto3 mcp httpx fastapi "uvicorn[standard]" pydantic python-multipart pytest
      - name: Python syntax (ast.parse)
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          bad = []
          for d in ["archive-api", "mcp-http-server", "scripts", "memory-rest-api"]:
              base = pathlib.Path(d)
              if not base.exists():
                  continue
              for p in base.rglob("*.py"):
                  try:
                      ast.parse(p.read_text(encoding="utf-8"))
                  except SyntaxError as e:
                      print(f"SYNTAX ERROR {p}: {e}")
                      bad.append(p)
          print("All Python source OK" if not bad else f"{len(bad)} files failed")
          sys.exit(1 if bad else 0)
          PY
      - name: Unit tests (sum hook + cron + archive-mcp)
        run: |
          set -e
          python -m pytest scripts/test_sum_hook.py -q
          python -m pytest scripts/test_r2_budget_check.py -q
          python -m pytest scripts/test_archive_mcp.py -q
      - name: Unit tests (mcp-http-server memory tools)
        working-directory: mcp-http-server
        env:
          ARCHIVE_URL: http://x
          ARCHIVE_AUTH_TOKEN: t
          MCP_BEARER_TOKEN: t
          USER_ID: thanh
        run: python -m pytest test_memory_tools.py -q
      - name: Unit tests (mcp-http-server OAuth, isolated process)
        working-directory: mcp-http-server
        run: python -m unittest test_oauth -v 2>&1 | tail -30

  plan:
    name: Resolve release scope
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      tag: ${{ steps.r.outputs.tag }}
      is_major: ${{ steps.r.outputs.is_major }}
      component: ${{ steps.r.outputs.component }}
      title: ${{ steps.r.outputs.title }}
    steps:
      - name: Resolve tag + component
        id: r
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            COMP_IN="${{ github.event.inputs.component }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            COMP_IN="auto"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if echo "$TAG" | grep -qE '^v[0-9]+\.0\.0$'; then
            echo "is_major=true" >> $GITHUB_OUTPUT
            echo "component=all" >> $GITHUB_OUTPUT
            echo "title=$TAG — Big Release (MCP cho Claude + Bản sửa ChatGPT)" >> $GITHUB_OUTPUT
          else
            echo "is_major=false" >> $GITHUB_OUTPUT
            COMP="$COMP_IN"
            if [ "$COMP" = "auto" ]; then COMP="mcp"; fi
            echo "component=$COMP" >> $GITHUB_OUTPUT
            echo "title=$TAG — Release ($COMP)" >> $GITHUB_OUTPUT
          fi

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build release notes
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          COMP="${{ needs.plan.outputs.component }}"
          IS_MAJOR="${{ needs.plan.outputs.is_major }}"
          MCP_BLOCK=$'## Tính năng MCP cho Claude\n- MCP HTTP server (Streamable HTTP + OAuth 2.1 + DCR) cho Claude App & Claude Code\n- Tool add_memory / search_memories (mem0)\n- Lệnh /sum + hook tự tóm tắt phiên\n- Archive: list/search/get session, load context để tiếp tục hội thoại'
          CHATGPT_BLOCK=$'## Bản sửa cho ChatGPT\n### memory-rest-api (server)\n- REST wrapper mem0 cho ChatGPT Custom GPT (OpenAPI sẵn import)\n- Endpoint /memories, /memories/search, list, delete\n- Đồng bộ Bearer token (CHATGPT_AUTH_TOKEN) với MCP HTTP server\n### chatgpt-desktop (app)\n- App desktop ChatGPT (Tauri/Rust), build Windows EXE qua CI'
          {
            echo "# $TAG"
            echo ""
            if [ "$IS_MAJOR" = "true" ]; then
              echo "> Big release — gồm đầy đủ các thành phần."
              echo ""
              echo "$MCP_BLOCK"
              echo ""
              echo "$CHATGPT_BLOCK"
            elif [ "$COMP" = "all" ]; then
              echo "$MCP_BLOCK"
              echo ""
              echo "$CHATGPT_BLOCK"
            elif [ "$COMP" = "chatgpt" ]; then
              echo "$CHATGPT_BLOCK"
            else
              echo "$MCP_BLOCK"
            fi
            echo ""
            echo "---"
            echo "_Thay đổi chi tiết: xem phần tự sinh bên dưới._"
          } > RELEASE_NOTES.md
          echo "Notes for $TAG (component=$COMP, major=$IS_MAJOR):"
          cat RELEASE_NOTES.md
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: ${{ needs.plan.outputs.title }}
          body_path: RELEASE_NOTES.md
          append_body: false
          generate_release_notes: true
          draft: false
          prerelease: false
