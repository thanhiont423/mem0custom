name: Release

# Tạo GitHub Release tự động khi push tag dạng v*.
# Chạy lại test trước, rồi publish release với ghi chú.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag để release (vd v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    name: Verify before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml openapi-spec-validator boto3 mcp httpx fastapi "uvicorn[standard]" pydantic python-multipart pytest
      - name: Python syntax (ast.parse)
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          bad = []
          targets = ["archive-api", "mcp-http-server", "scripts", "memory-rest-api"]
          for d in targets:
              base = pathlib.Path(d)
              if not base.exists():
                  continue
              for p in base.rglob("*.py"):
                  try:
                      ast.parse(p.read_text(encoding="utf-8"))
                  except SyntaxError as e:
                      print(f"SYNTAX ERROR {p}: {e}")
                      bad.append(p)
          print("All Python source OK" if not bad else f"{len(bad)} files failed")
          sys.exit(1 if bad else 0)
          PY
      - name: Unit tests (sum hook + memory tools + oauth + cron + archive-mcp)
        run: |
          set -e
          python -m pytest scripts/test_sum_hook.py -q
          python -m pytest scripts/test_r2_budget_check.py -q
          python -m pytest scripts/test_archive_mcp.py -q
          cd mcp-http-server
          ARCHIVE_URL=http://x ARCHIVE_AUTH_TOKEN=t MCP_BEARER_TOKEN=t USER_ID=thanh python -m pytest test_memory_tools.py test_oauth.py -q

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
