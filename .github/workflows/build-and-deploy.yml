name: Build & Deploy

on:
  push:
    branches: [test]
    paths:
      - 'mcp-http-server/**'
      - 'archive-api/**'
      - 'memory-rest-api/**'
      - '.github/workflows/build-and-deploy.yml'

  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build & deploy'
        required: true
        type: choice
        options: [all, mcp-http-server, archive-api, memory-rest-api]
        default: 'mcp-http-server'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-http-server, archive-api, memory-rest-api]

    steps:
      - name: Check if service should build
        id: check
        run: |
          INPUT="${{ github.event.inputs.service }}"
          SERVICE="${{ matrix.service }}"
          if [ "$INPUT" = "all" ] || [ "$INPUT" = "$SERVICE" ] || [ "$INPUT" = "" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "Skipping $SERVICE (input was $INPUT)"
          fi

      - name: Checkout
        if: steps.check.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        if: steps.check.outputs.build == 'true'
        id: lc
        run: echo "owner=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lc.outputs.owner }}/mem0custom-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.lc.outputs.owner }}/mem0custom-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Determine service
        id: svc
        run: |
          INPUT="${{ github.event.inputs.service }}"
          if [ "$INPUT" = "" ]; then INPUT="all"; fi
          echo "service=$INPUT" >> $GITHUB_OUTPUT

      - name: Pull image + restart container on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/memory-stack
            echo "=== Login to GHCR (using token from VPS .env) ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u thanhiont423 --password-stdin || true
            echo "=== Pull latest images ==="
            SVC="${{ steps.svc.outputs.service }}"
            if [ "$SVC" = "all" ]; then
              docker compose pull
              docker compose up -d --force-recreate
            else
              docker compose pull "$SVC"
              docker compose up -d --force-recreate "$SVC"
            fi
            sleep 5
            docker compose ps
            echo "=== Done ==="

      - name: Smoke test /health
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" https://claude.hangocthanh.io.vn/health)
          test "$code" = "200" && echo "✅ /health OK" || (echo "❌ Got $code" && exit 1)

      - name: Smoke test OAuth discovery (if mcp deployed)
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        run: |
          sleep 3
          code=$(curl -s -o /dev/null -w "%{http_code}" https://claude.hangocthanh.io.vn/mcp/.well-known/oauth-authorization-server)
          test "$code" = "200" && echo "✅ OAuth discovery OK" || (echo "❌ Got $code" && exit 1)
