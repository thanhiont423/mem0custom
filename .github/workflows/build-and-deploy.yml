name: Build & Deploy

on:
  push:
    branches: [test]
    paths:
      - 'mcp-http-server/**'
      - 'archive-api/**'
      - 'memory-rest-api/**'
      - '.github/workflows/build-and-deploy.yml'

  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build & deploy'
        required: true
        type: choice
        options: [all, mcp-http-server, archive-api, memory-rest-api]
        default: 'mcp-http-server'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-http-server, archive-api, memory-rest-api]

    steps:
      - name: Check if service should build
        id: check
        run: |
          INPUT="${{ github.event.inputs.service }}"
          SERVICE="${{ matrix.service }}"
          if [ "$INPUT" = "all" ] || [ "$INPUT" = "$SERVICE" ] || [ "$INPUT" = "" ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "Skipping $SERVICE (input was $INPUT)"
          fi

      - name: Checkout
        if: steps.check.outputs.build == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        if: steps.check.outputs.build == 'true'
        id: lc
        run: echo "owner=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lc.outputs.owner }}/mem0custom-${{ matrix.service }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.lc.outputs.owner }}/mem0custom-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: always() && !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Determine service
        id: svc
        run: |
          INPUT="${{ github.event.inputs.service }}"
          if [ "$INPUT" = "" ]; then INPUT="all"; fi
          echo "service=$INPUT" >> $GITHUB_OUTPUT

      - name: Pull image + restart container on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/memory-stack
            echo "=== Login to GHCR ==="
            echo "$GHCR_TOKEN" | docker login ghcr.io -u thanhiont423 --password-stdin || true
            echo "=== Pull latest images ==="
            SVC="${{ steps.svc.outputs.service }}"
            if [ "$SVC" = "all" ]; then
              docker compose pull
              docker compose up -d --force-recreate
            else
              docker compose pull "$SVC"
              docker compose up -d --force-recreate "$SVC"
            fi
            sleep 5
            docker compose ps
            echo "=== Done ==="

      - name: Smoke test /health
        run: |
          sleep 8
          code=$(curl -s -o /dev/null -w "%{http_code}" https://claude.hangocthanh.io.vn/health)
          test "$code" = "200" && echo "/health OK" || (echo "Got $code" && exit 1)

      - name: Smoke test OAuth discovery (3 endpoints)
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        run: |
          sleep 3
          for path in oauth-authorization-server oauth-protected-resource openid-configuration; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://claude.hangocthanh.io.vn/mcp/.well-known/$path")
            test "$code" = "200" && echo "/.well-known/$path OK" || (echo "/.well-known/$path got $code" && exit 1)
          done

      - name: Smoke test DCR /register (should be 201)
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST https://claude.hangocthanh.io.vn/mcp/register \
            -H "Content-Type: application/json" \
            -d '{"client_name":"CI Test","redirect_uris":["https://claude.ai/api/mcp/auth_callback"]}')
          test "$code" = "201" && echo "DCR returns 201 OK" || (echo "DCR got $code expected 201" && exit 1)

      - name: Smoke test MCP tools/list
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        env:
          TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Skipped: MCP_BEARER_TOKEN not set in repo secrets"
            exit 0
          fi
          resp=$(curl -s -X POST https://claude.hangocthanh.io.vn/mcp \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}')
          count=$(echo "$resp" | python3 -c "import sys,json; r=json.load(sys.stdin); print(len(r.get('result',{}).get('tools',[])))")
          test "$count" -ge "6" && echo "tools/list returned $count tools" || (echo "Expected ge 6 tools got $count Body: $resp" && exit 1)

      - name: Smoke test MCP tools/call list_old_sessions
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        env:
          TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "Skipped: MCP_BEARER_TOKEN not set"
            exit 0
          fi
          resp=$(curl -s -X POST https://claude.hangocthanh.io.vn/mcp \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"list_old_sessions","arguments":{"limit":3}}}')
          echo "=== RAW RESPONSE (first 1500 chars) ==="
          echo "$resp" | head -c 1500
          echo ""
          echo "=== END RAW ==="
          # Parse — accept either valid inner JSON OR error message
          echo "$resp" | python3 -c "
          import sys, json
          r = json.load(sys.stdin)
          if r.get('error'):
              print('FAIL JSON-RPC error:', r['error']); sys.exit(1)
          result = r.get('result', {})
          if result.get('isError'):
              content = result.get('content', [])
              text = content[0]['text'] if content else 'no content'
              print(f'FAIL tool isError=True: {text[:500]}'); sys.exit(1)
          content = result.get('content', [])
          if not content:
              print('FAIL no content blocks'); sys.exit(1)
          text = content[0]['text']
          print(f'Content[0].text preview (200ch): {text[:200]}')
          # Try parse as JSON (some tools return JSON string, some return plain text)
          try:
              inner = json.loads(text)
              n = len(inner) if hasattr(inner, '__len__') else -1
              print(f'tools/call OK, inner type={type(inner).__name__}, count={n}')
          except json.JSONDecodeError as e:
              print(f'FAIL text is not JSON: {e}')
              sys.exit(1)
          "

      - name: Debug archive-api logs if tools/call fails
        if: failure() && (contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all')
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== archive-api logs (last 50) ==="
            docker logs --tail 50 memory-archive-api 2>&1 | tail -50
            echo ""
            echo "=== mcp-http-server logs (last 30) ==="
            docker logs --tail 30 memory-mcp-http 2>&1 | tail -30
            echo ""
            echo "=== Container status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "archive|mcp|qdrant|caddy"

      - name: Verify no RuntimeError in container logs
        if: contains(steps.svc.outputs.service, 'mcp') || steps.svc.outputs.service == 'all'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            errors=$(docker logs --since 3m memory-mcp-http 2>&1 | grep -iE "RuntimeError|Response content longer|Traceback" | head -5)
            if [ -n "$errors" ]; then
              echo "FAIL Found errors in last 3m:"
              echo "$errors"
              exit 1
            fi
            echo "OK No RuntimeError in container logs"
