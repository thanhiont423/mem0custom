name: Tests

on:
  push:
    branches: [main, new-features, test]
  pull_request:
    branches: [main, new-features]
  workflow_dispatch:

jobs:
  syntax-check:
    name: Validate code & config syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml openapi-spec-validator boto3 mcp httpx

      - name: Python syntax check (ast.parse)
        run: |
          set -e
          count=0
          for f in $(find . -name "*.py" -not -path "./.git/*"); do
            echo "→ $f"
            python -c "import ast; ast.parse(open('$f').read())"
            count=$((count + 1))
          done
          echo "✅ Parsed $count Python files OK"

      - name: YAML syntax check
        run: |
          set -e
          count=0
          for f in $(find . \( -name "*.yaml" -o -name "*.yml" \) -not -path "./.git/*"); do
            echo "→ $f"
            python -c "import yaml; yaml.safe_load(open('$f'))"
            count=$((count + 1))
          done
          echo "✅ Parsed $count YAML files OK"

      - name: Validate OpenAPI spec (ChatGPT GPT)
        run: |
          python -c "
          from openapi_spec_validator import validate
          import yaml
          spec = yaml.safe_load(open('memory-rest-api/openapi-for-chatgpt.yaml'))
          validate(spec)
          print('✅ OpenAPI spec valid')
          print(f\"  Title: {spec['info']['title']}\")
          print(f\"  Version: {spec['info']['version']}\")
          print(f\"  Paths: {list(spec['paths'].keys())}\")
          print(f\"  Servers: {spec.get('servers', [])}\")
          "

      - name: Validate docker-compose.yml
        run: |
          docker compose -f docker-compose.yml config --quiet
          echo "✅ docker-compose.yml valid"

      - name: Check .env.example completeness
        run: |
          set -e
          test -f .env.example
          for var in QDRANT_API_KEY POSTGRES_PASSWORD MCP_BEARER_TOKEN ARCHIVE_AUTH_TOKEN; do
            if grep -q "^$var=" .env.example; then
              echo "  ✓ $var present"
            else
              echo "  ✗ Missing $var in .env.example"
              exit 1
            fi
          done
          echo "✅ All required env vars documented"

      - name: Run cron unit tests (r2-budget-check)
        run: |
          set -e
          python -m unittest scripts.test_r2_budget_check -v 2>&1 | tail -30
          echo "✅ Cron unit tests passed"

      - name: Run MCP unit tests (archive-mcp)
        run: |
          set -e
          python -m unittest scripts.test_archive_mcp -v 2>&1 | tail -25
          echo "✅ MCP tools tests passed"

      - name: Summary
        run: |
          echo "All syntax checks + unit tests passed!"
          echo ""
          echo "Validated:"
          echo "  - Python files (ast.parse)"
          echo "  - YAML files"
          echo "  - OpenAPI spec for ChatGPT"
          echo "  - docker-compose.yml"
          echo "  - .env.example completeness"
          echo "  - r2-budget-check.py unit tests (20 tests)"
          echo "  - archive-mcp.py unit tests (16 tests)"

  smoke-test-prod:
    name: Smoke test production endpoints
    runs-on: ubuntu-latest
    needs: syntax-check
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Test /health (no auth required)
        run: |
          set -e
          code=$(curl -s -o /dev/null -w "%{http_code}" https://claude.hangocthanh.io.vn/health)
          echo "Code: $code"
          test "$code" = "200"
          echo "✅ /health OK"

      - name: Test /archive (requires ARCHIVE_AUTH_TOKEN secret)
        env:
          TOKEN: ${{ secrets.ARCHIVE_AUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "⊘ Skipped (ARCHIVE_AUTH_TOKEN not set)"
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://claude.hangocthanh.io.vn/archive/sessions?user_id=thanh&limit=1")
          echo "Code: $code"
          test "$code" = "200"
          echo "✅ /archive auth OK"

      - name: Test /memory openapi.json (requires CHATGPT_AUTH_TOKEN secret)
        env:
          TOKEN: ${{ secrets.CHATGPT_AUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "⊘ Skipped (CHATGPT_AUTH_TOKEN not set)"
            exit 0
          fi
          spec=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://claude.hangocthanh.io.vn/memory/openapi.json")
          paths=$(echo "$spec" | python3 -c "import sys, json; print(list(json.load(sys.stdin).get('paths', {}).keys()))")
          echo "Paths: $paths"
          echo "$paths" | grep -q "/memories"
          echo "✅ /memory openapi OK"

      - name: Test /mcp tools/list (requires MCP_BEARER_TOKEN secret)
        env:
          TOKEN: ${{ secrets.MCP_BEARER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "⊘ Skipped (MCP_BEARER_TOKEN not set)"
            exit 0
          fi
          resp=$(curl -s -X POST "https://claude.hangocthanh.io.vn