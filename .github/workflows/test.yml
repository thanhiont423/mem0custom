name: Tests

on:
  push:
    branches: [ v0.4.2-http-portable, main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }} / Py ${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install package + test deps
        run: |
          python -m pip install -e ".[dev]" --disable-pip-version-check
          python -m pip install httpx python-dotenv --disable-pip-version-check

      - name: Show installed
        run: python -m pip show mem0-mcp-selfhosted pytest httpx

      - name: Run unit tests (archive pipeline + tools + http_server wrapper)
        run: |
          python -m pytest tests/unit/test_archive_pipeline.py tests/unit/test_archive_tools_register.py tests/unit/test_http_server_wrapper.py -v --tb=short

  lint:
    name: Syntax check all modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile all Python files
        run: |
          python -m compileall -q src/mem0_mcp_selfhosted/

  schema-check:
    name: VPS schema match (CompactSummary fields)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify compact summary payload schema
        run: |
          python -c "
          import ast
          with open('src/mem0_mcp_selfhosted/archive_upload.py') as f:
              tree = ast.parse(f.read())
          src = open('src/mem0_mcp_selfhosted/archive_upload.py').read()
          required_fields = ['user_id', 'project_tag', 'workspace_path', 'summary_text', 'messages_before', 'position_in_session']
          for field in required_fields:
              assert f'\"{field}\"' in src, f'Missing field {field} in payload'
              print(f'  OK: {field}')
          # Bug fix #19 verifications
          assert 'compacted_at' not in src.split('def _extract_compact_summaries')[1].split('def ')[0], 'compacted_at must NOT be in top-level _extract_compact_summaries'
          print('  OK: compacted_at not in top-level (bug fix #19)')
          assert 'source_position' not in src, 'source_position must NOT exist (use position_in_session top-level)'
          print('  OK: no source_position (bug fix #19)')
          print('All schema checks PASS')
          "
