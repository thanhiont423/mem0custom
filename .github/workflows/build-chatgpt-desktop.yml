name: Build ChatGPT Desktop

# Trigger:
#   - Push lên main hoặc feature/chatgpt-desktop-export → build + upload artifact
#   - Tag v* (vd v0.1.0)                                → build + tạo GitHub Release
#   - Pull request                                       → chỉ test, không upload
#   - workflow_dispatch                                  → chạy thủ công từ tab Actions
on:
  push:
    branches:
      - main
      - feature/chatgpt-desktop-export
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel run cũ khi push commit mới lên cùng branch (tránh tốn phút runner)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- 1. Test logic Python (nhanh, chạy song song với build) ----------
  test-logic:
    name: Verify logic (Python harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatgpt-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run 17 test cases
        run: python test_history_logic.py

  # ---------- 2. Build .msi + .exe trên Windows ----------
  build-windows:
    name: Build Windows installer
    needs: test-logic
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chatgpt-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chatgpt-desktop/src-tauri -> target
          shared-key: tauri-windows

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~\.pnpm-store
          key: pnpm-${{ hashFiles('chatgpt-desktop/pnpm-lock.yaml') }}

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Rust unit tests (history.rs)
        run: cargo test --bin chatgpt core::history -- --nocapture
        working-directory: chatgpt-desktop/src-tauri

      - name: Build Tauri release (.msi + .exe)
        run: pnpm tauri build

      - name: List build output
        run: |
          Write-Host "=== bundle/ contents ==="
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File | Select-Object FullName, Length

      - name: Upload .msi installer
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-msi-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload .exe NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-nsis-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-exe-portable
          path: chatgpt-desktop/src-tauri/target/release/ChatGPT.exe
          if-no-files-found: warn

  # ---------- 3. Tự tạo GitHub Release khi push tag v* ----------
  release:
    name: Create GitHub Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: List downloaded files
        run: find ./release-artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/ChatGPT-msi-installer/*.msi
            ./release-artifacts/ChatGPT-nsis-installer/*.exe
            ./release-artifacts/ChatGPT-exe-portable/*.exe
          generate_release_notes: true
          body: |
            ## ChatGPT Desktop ${{ github.ref_name }}

            Tích hợp với mem0custom server — export chat history dưới dạng JSON theo keyword `compact` / `lưu`.

            ### Cài đặt
            - **Recommended:** tải `*.msi` và double-click cài
            - **Portable:** tải `ChatGPT.exe`, chạy trực tiếp (không cài hệ thống)

            ### Tính năng mới
            - Lưu chat session ra JSON khi gõ `compact` hoặc `lưu`
            - WAL recovery khi app crash
            - Auto-compact khi đóng app

            Chi tiết: xem [CHAT-HISTORY-README.md](chatgpt-desktop/CHAT-HISTORY-README.md)
