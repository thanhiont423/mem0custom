name: Build ChatGPT Desktop

on:
  push:
    branches:
      - main
      - feature/chatgpt-desktop-export
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-logic:
    name: Verify logic (Python harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatgpt-desktop
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run 17 test cases
        run: python test_history_logic.py

  build-windows:
    name: Build Windows installer
    needs: test-logic
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chatgpt-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chatgpt-desktop/src-tauri -> target
          shared-key: tauri-windows

      - name: Install frontend dependencies (approve esbuild build script)
        shell: pwsh
        run: |
          pnpm install --no-frozen-lockfile
          # esbuild needs post-install script to download binary
          # pnpm 9 blocks it by default → approve esbuild specifically
          if (Test-Path package.json) {
            (Get-Content package.json -Raw) | ConvertFrom-Json | ForEach-Object {
              $pkg = $_
              if (-not $pkg.PSObject.Properties['pnpm']) {
                $pkg | Add-Member -NotePropertyName 'pnpm' -NotePropertyValue ([PSCustomObject]@{})
              }
              if (-not $pkg.pnpm.PSObject.Properties['onlyBuiltDependencies']) {
                $pkg.pnpm | Add-Member -NotePropertyName 'onlyBuiltDependencies' -NotePropertyValue @('esbuild')
              }
              $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
            }
            pnpm install --no-frozen-lockfile
          }

      - name: Verify tauri CLI available
        shell: pwsh
        run: |
          pnpm tauri --version
          Write-Host "Working dir: $(Get-Location)"
          Write-Host "Frontend src exists: $(Test-Path src)"
          Write-Host "Tauri config exists: $(Test-Path src-tauri/tauri.conf.json)"

      - name: Build frontend explicitly (vite)
        shell: pwsh
        run: |
          pnpm build
          if (-not (Test-Path dist)) {
            Write-Error "FAIL: dist/ không được tạo sau pnpm build — vite build hỏng"
            exit 1
          }
          Write-Host "PASS: dist/ created"
          Get-ChildItem dist -Recurse | Select-Object Name, Length

      - name: Run Rust unit tests (history.rs)
        run: cargo test --bin chatgpt core::history -- --nocapture
        working-directory: chatgpt-desktop/src-tauri

      - name: Build Tauri release (verbose to catch silent fails)
        shell: pwsh
        run: |
          pnpm tauri build --verbose 2>&1
          $exit = $LASTEXITCODE
          Write-Host "tauri build exit code: $exit"
          if ($exit -ne 0) {
            Write-Error "tauri build failed with exit $exit"
            exit $exit
          }

      - name: Diagnostic — dump target/release structure
        if: always()
        shell: pwsh
        run: |
          $targetRoot = "src-tauri/target"
          if (-not (Test-Path $targetRoot)) {
            Write-Warning "target/ KHÔNG tồn tại — cargo chưa từng chạy ở src-tauri/"
          } else {
            Write-Host "=== src-tauri/target/ (top 2 levels) ==="
            Get-ChildItem -Path $targetRoot -Depth 1 -Force | Select-Object Mode, LastWriteTime, Length, Name
          }
          $release = "src-tauri/target/release"
          if (Test-Path $release) {
            Write-Host "=== release/ files ==="
            Get-ChildItem -Path $release -File | Select-Object Name, Length
            $bundle = "$release/bundle"
            if (Test-Path $bundle) {
              Write-Host "=== bundle/ contents ==="
              Get-ChildItem -Path $bundle -Recurse -File | Select-Object FullName, Length
            } else {
              Write-Warning "bundle/ KHÔNG tồn tại — tauri compile được .exe nhưng KHÔNG bundle"
            }
          } else {
            Write-Warning "release/ KHÔNG tồn tại — tauri không chạy cargo --release"
          }

      - name: Upload .msi installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-msi-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload .exe NSIS installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-nsis-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload portable .exe
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-exe-portable
          path: chatgpt-desktop/src-tauri/target/release/ChatGPT.exe
          if-no-files-found: warn

  smoke-test:
    name: Smoke test installer
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Download .msi artifact
        uses: actions/download-artifact@v4
        with:
          name: ChatGPT-msi-installer
          path: ./installer

      - name: Locate .msi
        id: find_msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path ./installer -Filter *.msi -Recurse | Select-Object -First 1
          if (-not $msi) { Write-Error "No .msi file"; exit 1 }
          $sizeMB = [math]::Round($msi.Length / 1MB, 2)
          Write-Host "Found: $($msi.FullName) ($sizeMB MB)"
          if ($sizeMB -lt 2) { Write-Error "MSI too small ($sizeMB MB)"; exit 1 }
          echo "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT

      - name: Install .msi silently
        shell: pwsh
        run: |
          $msi = "${{ steps.find_msi.outputs.msi_path }}"
          $proc = Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart /l*v install.log" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "Install failed: $($proc.ExitCode)"
            if (Test-Path install.log) { Get-Content install.log -Tail 50 }
            exit 1
          }
          Write-Host "Install OK"

      - name: Locate installed ChatGPT.exe
        id: find_exe
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\ChatGPT\ChatGPT.exe",
            "C:\Program Files (x86)\ChatGPT\ChatGPT.exe",
            "$env:LOCALAPPDATA\Programs\ChatGPT\ChatGPT.exe"
          )
          $exe = $null
          foreach ($p in $candidates) { if (Test-Path $p) { $exe = $p; break } }
          if (-not $exe) {
            $exe = Get-ChildItem -Path "C:\Program Files" -Filter "ChatGPT.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $exe) { Write-Error "ChatGPT.exe not found"; exit 1 }
          Write-Host "Found: $exe"
          echo "exe_path=$exe" >> $env:GITHUB_OUTPUT

      - name: Launch app, verify no crash
        shell: pwsh
        run: |
          $exe = "${{ steps.find_exe.outputs.exe_path }}"
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          $running = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if (-not $running) {
            Write-Error "ChatGPT.exe crashed on startup"
            exit 1
          }
          Write-Host "OK: ChatGPT running (PID $($proc.Id))"

      - name: Verify history.rs init_session created files
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          $appData = "$env:APPDATA\com.nofwl.chatgpt"
          if (-not (Test-Path $appData)) { Write-Warning "App data dir not created yet"; exit 0 }
          Get-ChildItem $appData -Recurse | Select-Object FullName, Length
          $meta = Join-Path $appData "current.session"
          if (Test-Path $meta) {
            $c = Get-Content $meta -Raw | ConvertFrom-Json
            if ($c.session_id -match '^s[0-9a-f]+$') {
              Write-Host "PASS: session_id format OK: $($c.session_id)"
            } else {
              Write-Error "FAIL: session_id format: $($c.session_id)"
              exit 1
            }
          }

      - name: Kill app
        if: always()
        shell: pwsh
        run: Get-Process -Name "ChatGPT" -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Uninstall .msi
        if: always()
        shell: pwsh
        run: |
          $msi = "${{ steps.find_msi.outputs.msi_path }}"
          if ($msi) { Start-Process msiexec.exe -ArgumentList "/x `"$msi`" /quiet /norestart" -Wait }

      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install.log
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: [build-windows, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
      - run: find ./release-artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/ChatGPT-msi-installer/*.msi
            ./release-artifacts/ChatGPT-nsis-installer/*.exe
            ./release-artifacts/ChatGPT-exe-portable/*.exe
          generate_release_notes: true
