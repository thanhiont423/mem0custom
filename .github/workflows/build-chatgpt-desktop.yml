name: Build ChatGPT Desktop

on:
  push:
    branches:
      - main
      - feature/chatgpt-desktop-export
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-logic:
    name: Verify logic (Python harness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chatgpt-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python test_history_logic.py

  build-windows:
    name: Build Windows installer
    needs: test-logic
    runs-on: windows-latest
    defaults:
      run:
        working-directory: chatgpt-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with: { version: 9 }

      - name: Setup Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Ensure WiX Toolset available
        shell: pwsh
        run: |
          # Check WiX đã có chưa (windows-latest thường đã preinstalled)
          $candidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "${env:WIX}bin"
          )
          $wixBin = $null
          foreach ($p in $candidates) {
            if ($p -and (Test-Path "$p\candle.exe")) { $wixBin = $p; break }
          }
          if (-not $wixBin) {
            Write-Host "WiX chưa có, đang install qua choco..."
            choco install wixtoolset --no-progress --yes --force
            $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
            if (-not (Test-Path "$wixBin\candle.exe")) {
              $wixBin = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
            }
          }
          if (Test-Path "$wixBin\candle.exe") {
            Write-Host "PASS WiX bin: $wixBin"
            & "$wixBin\candle.exe" -? | Select-Object -First 1
            echo "$wixBin" >> $env:GITHUB_PATH
          } else {
            Write-Warning "WiX bin không tìm thấy — MSI sẽ không build được, fallback NSIS"
          }

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chatgpt-desktop/src-tauri -> target
          shared-key: tauri-windows

      - name: Install frontend dependencies (approve esbuild)
        shell: pwsh
        run: |
          pnpm install --no-frozen-lockfile
          if (Test-Path package.json) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            if (-not $pkg.PSObject.Properties['pnpm']) {
              $pkg | Add-Member -NotePropertyName 'pnpm' -NotePropertyValue ([PSCustomObject]@{})
            }
            if (-not $pkg.pnpm.PSObject.Properties['onlyBuiltDependencies']) {
              $pkg.pnpm | Add-Member -NotePropertyName 'onlyBuiltDependencies' -NotePropertyValue @('esbuild')
              $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
              pnpm install --no-frozen-lockfile
            }
          }

      - name: Verify tauri CLI available
        shell: pwsh
        run: |
          pnpm tauri --version
          Write-Host "WiX in PATH: $(Get-Command candle.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)"

      - name: Build frontend (vite)
        shell: pwsh
        run: |
          pnpm build
          if (-not (Test-Path dist)) { Write-Error "dist/ missing"; exit 1 }
          Write-Host "PASS dist/ created"

      - name: Run Rust unit tests
        run: cargo test --bin chatgpt core::history -- --nocapture
        working-directory: chatgpt-desktop/src-tauri

      - name: Build Tauri release (verbose)
        shell: pwsh
        run: pnpm tauri build --verbose

      - name: Diagnostic — dump release/ + bundle/
        if: always()
        shell: pwsh
        run: |
          $release = "src-tauri/target/release"
          if (Test-Path $release) {
            Write-Host "=== release/ files ==="
            Get-ChildItem -Path $release -File | Select-Object Name, Length
            if (Test-Path "$release/bundle") {
              Write-Host "=== bundle/ contents ==="
              Get-ChildItem -Path "$release/bundle" -Recurse -File | Select-Object FullName, Length
            } else {
              Write-Warning "bundle/ KHÔNG tồn tại"
            }
          } else {
            Write-Warning "release/ KHÔNG tồn tại"
          }

      - name: Upload .msi installer (optional — WiX có thể fail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-msi-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload .exe NSIS installer (PRIMARY)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-nsis-installer
          path: chatgpt-desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload portable .exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ChatGPT-exe-portable
          path: chatgpt-desktop/src-tauri/target/release/ChatGPT.exe
          if-no-files-found: warn

  smoke-test:
    name: Smoke test installer (NSIS preferred, MSI fallback)
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./installer

      - name: Pick installer (NSIS > MSI > portable)
        id: pick
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Path ./installer/ChatGPT-nsis-installer -Filter *.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          $msi  = Get-ChildItem -Path ./installer/ChatGPT-msi-installer  -Filter *.msi -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            Write-Host "Will install NSIS: $($nsis.FullName)"
            echo "type=nsis" >> $env:GITHUB_OUTPUT
            echo "path=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
          } elseif ($msi) {
            Write-Host "Will install MSI: $($msi.FullName)"
            echo "type=msi" >> $env:GITHUB_OUTPUT
            echo "path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "No installer found in any artifact"
            Get-ChildItem -Path ./installer -Recurse | Select-Object FullName
            exit 1
          }

      - name: Install silently
        shell: pwsh
        run: |
          $path = "${{ steps.pick.outputs.path }}"
          $type = "${{ steps.pick.outputs.type }}"
          if ($type -eq "nsis") {
            # NSIS silent flag: /S
            $proc = Start-Process -FilePath $path -ArgumentList "/S" -Wait -PassThru
          } else {
            $proc = Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart /l*v install.log" -Wait -PassThru
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "Install failed: $($proc.ExitCode)"
            if (Test-Path install.log) { Get-Content install.log -Tail 50 }
            exit 1
          }
          Write-Host "Install OK"

      - name: Locate installed ChatGPT.exe
        id: find_exe
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\ChatGPT\ChatGPT.exe",
            "C:\Program Files (x86)\ChatGPT\ChatGPT.exe",
            "$env:LOCALAPPDATA\Programs\ChatGPT\ChatGPT.exe",
            "$env:LOCALAPPDATA\ChatGPT\ChatGPT.exe"
          )
          $exe = $null
          foreach ($p in $candidates) { if (Test-Path $p) { $exe = $p; break } }
          if (-not $exe) {
            $exe = Get-ChildItem -Path "C:\Program Files","$env:LOCALAPPDATA" -Filter "ChatGPT.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $exe) { Write-Error "ChatGPT.exe not found after install"; exit 1 }
          Write-Host "Found: $exe"
          echo "exe_path=$exe" >> $env:GITHUB_OUTPUT

      - name: Launch app, verify no crash
        shell: pwsh
        run: |
          $exe = "${{ steps.find_exe.outputs.exe_path }}"
          $proc = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 8
          $running = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue
          if (-not $running) { Write-Error "ChatGPT crashed on startup"; exit 1 }
          Write-Host "OK ChatGPT running (PID $($proc.Id))"

      - name: Verify init_session created files
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          $appData = "$env:APPDATA\com.nofwl.chatgpt"
          if (-not (Test-Path $appData)) { Write-Warning "App data dir not created"; exit 0 }
          Get-ChildItem $appData -Recurse | Select-Object FullName, Length
          $meta = Join-Path $appData "current.session"
          if (Test-Path $meta) {
            $c = Get-Content $meta -Raw | ConvertFrom-Json
            if ($c.session_id -match '^s[0-9a-f]+$') {
              Write-Host "PASS session_id format OK: $($c.session_id)"
            } else {
              Write-Error "FAIL session_id: $($c.session_id)"; exit 1
            }
          }

      - name: Kill app
        if: always()
        shell: pwsh
        run: Get-Process -Name "ChatGPT" -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Upload install log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install.log
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: [build-windows, smoke-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: ./release-artifacts }
      - run: find ./release-artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-artifacts/ChatGPT-msi-installer/*.msi
            ./release-artifacts/ChatGPT-nsis-installer/*.exe
            ./release-artifacts/ChatGPT-exe-portable/*.exe
          generate_release_notes: true
