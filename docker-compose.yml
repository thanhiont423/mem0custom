services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memory-qdrant
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    restart: unless-stopped
    networks: [memnet]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    restart: unless-stopped
    networks: [memnet]

  archive-api:
    build: ./archive-api
    container_name: memory-archive-api
    environment:
      DB_URL: postgresql://mem0:${POSTGRES_PASSWORD}@postgres/mem0
      ARCHIVE_AUTH_TOKEN: ${ARCHIVE_AUTH_TOKEN}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_INTERNAL_URL: http://qdrant:6333
      # Optional: enables LLM summary + semantic search
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEM0_EMBED_MODEL: ${MEM0_EMBED_MODEL:-text-embedding-3-small}
      MEM0_EMBED_DIMS: ${MEM0_EMBED_DIMS:-1536}
      # Optional: enables R2/B2 hybrid storage
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-mem0-transcripts}
    networks: [memnet]
    